<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Galaxy</title>
    <link rel="stylesheet" href="spg.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=McLaren&display=swap" rel="stylesheet">
</head>
<body>

<img class="background" src="SMG Background.jpg">

<div class="sceneone">
    <img class="title" src="Super Mario Galaxy Logo.webp">
    <h1 class="kbd">Press <span class="spacebar">spacebar</span> to start.</h1>
    <p class="credits">Background by TheNightcapKing on DeviantArt!</p>
</div>

<div class="scenetwo">
    <img class="elements" src="SPG Elements.png">
    <a href="index.html">
    <img class="starbutton" src="SMG Star Button.png"></a>

    <nav class="navigation">
        <button class="continuebutton">Continue</button>
        <button class="savebutton">Save and Quit</button>
    </nav>

    <div class="thinkarea">
        <h1 class="think">What do you think of this game?</h1>
        <textarea class="thinkbox" placeholder="Rate this game"></textarea>
    </div>
</div>

<script src="spg.js"></script>
</body>
</html>
